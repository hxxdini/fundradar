name: fundradar-pipeline

on:
  schedule:
    - cron: '7 */4 * * *' # every 4 hours, :07 past (off the hour to dodge GitHub's peak-minute scheduling delays)
  workflow_dispatch: {}

concurrency:
  group: fundradar-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: npm ci
      - name: Run ingestion pipeline
        run: node src/pipeline.js
      - name: Generate digest and site
        run: |
          node src/digest.js
          node src/site.js
      - name: Commit updated data
        run: |
          git config user.name "fundradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data out docs
          git diff --cached --quiet || git commit -m "Pipeline run $(date -u +'%F %H:%M')"
          git pull --rebase -X ours origin main
          git push
      - name: Force a Pages (re)build and confirm it lands
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="${{ github.repository }}"
          for attempt in 1 2 3 4 5; do
            gh api -X POST "repos/$repo/pages/builds" >/dev/null || true
            sleep 20
            status=$(gh api "repos/$repo/pages/builds/latest" -q .status)
            echo "attempt $attempt: $status"
            if [ "$status" = "built" ]; then exit 0; fi
            sleep $((attempt * 20))
          done
          echo "::error::GitHub Pages build did not succeed after retries — site may be stale"
          exit 1
      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PAGES_OUTCOME: ${{ steps.pages.outcome }}
        run: node src/notify-telegram.js
