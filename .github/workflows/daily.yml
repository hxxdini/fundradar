name: daily-pipeline

on:
  schedule:
    - cron: '0 4 * * *' # 07:00 EAT, daily
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: npm ci
      - name: Run ingestion pipeline
        run: node src/pipeline.js
      - name: Generate digest and site
        run: |
          node src/digest.js
          node src/site.js
      - name: Commit updated data
        run: |
          git config user.name "fundradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data out
          git diff --cached --quiet || git commit -m "Daily pipeline run $(date -u +%F)"
          git pull --rebase -X ours origin main
          git push
