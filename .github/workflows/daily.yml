name: daily-pipeline

on:
  schedule:
    - cron: '0 4 * * *' # 07:00 EAT, daily
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: npm ci
      - name: Run ingestion pipeline
        run: node src/pipeline.js
      - name: Generate digest and site
        run: |
          node src/digest.js
          node src/site.js
      - name: Commit updated data
        run: |
          git config user.name "fundradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data out docs
          git diff --cached --quiet || git commit -m "Daily pipeline run $(date -u +%F)"
          git pull --rebase -X ours origin main
          git push
      - name: Force a Pages (re)build and confirm it lands
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="${{ github.repository }}"
          for attempt in 1 2 3 4 5; do
            gh api -X POST "repos/$repo/pages/builds" >/dev/null || true
            sleep 20
            status=$(gh api "repos/$repo/pages/builds/latest" -q .status)
            echo "attempt $attempt: $status"
            if [ "$status" = "built" ]; then exit 0; fi
            sleep $((attempt * 20))
          done
          echo "::error::GitHub Pages build did not succeed after retries — site may be stale"
          exit 1
